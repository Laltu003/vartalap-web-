<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6D4FEC"/>
      <stop offset="100%" stop-color="#231352"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E3DAFF"/>
    </linearGradient>
  </defs>

  <rect width="200" height="200" rx="44" fill="url(#bg)"/>

  <!--
    Single continuous gesture: a "V" (for VartaLap) whose right arm
    extends and curls into a speech comma — one stroke, two meanings.
  -->
  <path d="
    M 52 58
    L 96 142
    L 140 58
    L 140 100
    C 140 116, 153 129, 169 129
  "
  fill="none"
  stroke="url(#stroke)"
  stroke-width="16"
  stroke-linecap="round"
  stroke-linejoin="round"/>

  <!-- Speech-comma terminus: a dot that completes the "trailing off into talk" idea -->
  <circle cx="169" cy="129" r="9" fill="#FFFFFF"/>
</svg>
